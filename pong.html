<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PONG</title>
<style>*{margin:0;padding:0}body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#fff;overflow:hidden}canvas{display:block}#ui{position:fixed;top:8px;width:100%;text-align:center;font-size:11px;letter-spacing:3px;color:#555}</style>
</head><body>
<div id="ui">W/S — LEFT PADDLE &nbsp;|&nbsp; ↑/↓ — RIGHT PADDLE</div>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=c.width=640,H=c.height=480;
let p1={y:H/2-40,s:0},p2={y:H/2-40,s:0};
let bx=W/2,by=H/2,bvx=5,bvy=4*(Math.random()>.5?1:-1);
const keys={};
document.addEventListener('keydown',e=>keys[e.key]=true);
document.addEventListener('keyup',e=>keys[e.key]=false);
function reset(){bx=W/2;by=H/2;bvx=5*(bvx>0?-1:1);bvy=4*(Math.random()>.5?1:-1);}
function loop(){
  if(keys['w'])p1.y=Math.max(0,p1.y-6);
  if(keys['s'])p1.y=Math.min(H-80,p1.y+6);
  if(keys['ArrowUp'])p2.y=Math.max(0,p2.y-6);
  if(keys['ArrowDown'])p2.y=Math.min(H-80,p2.y+6);
  bx+=bvx;by+=bvy;
  if(by<=0||by>=H-8)bvy*=-1;
  if(bx<=28&&by+8>p1.y&&by<p1.y+80){bvx=Math.abs(bvx)*1.05;bvy+=(by-(p1.y+40))*.1;}
  if(bx>=W-28-8&&by+8>p2.y&&by<p2.y+80){bvx=-Math.abs(bvx)*1.05;bvy+=(by-(p2.y+40))*.1;}
  bvx=Math.max(-14,Math.min(14,bvx));bvy=Math.max(-12,Math.min(12,bvy));
  if(bx<0){p2.s++;reset();}if(bx>W){p1.s++;reset();}
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8,8]);ctx.strokeStyle='#222';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#fff';ctx.fillRect(20,p1.y,10,80);ctx.fillRect(W-30,p2.y,10,80);
  ctx.fillStyle='#00ffff';ctx.fillRect(bx,by,8,8);
  ctx.font='36px monospace';ctx.textAlign='center';ctx.fillStyle='#ffe600';
  ctx.fillText(p1.s,W/4,50);ctx.fillText(p2.s,3*W/4,50);
  if(p1.s>=7||p2.s>=7){
    ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ffe600';ctx.font='28px monospace';ctx.textAlign='center';
    ctx.fillText((p1.s>=7?'P1':'P2')+' WINS!',W/2,H/2);
    window.parent.postMessage({type:'SCORE',id:'pong',score:Math.max(p1.s,p2.s)*100},'*');
  }
  requestAnimationFrame(loop);
}
loop();
</script></body></html>
