<!DOCTYPE html><html><head><meta charset="UTF-8"><title>MARIO BROTHERS</title>
<style>*{margin:0;padding:0}body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;overflow:hidden}</style>
</head><body><canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d'),W=c.width=640,H=c.height=480;
function draw(t){
  ctx.fillStyle='rgba(0,0,10,0.12)';ctx.fillRect(0,0,W,H);
  for(let i=0;i<6;i++){
    const a=t*.001+i*1.05,r=50+i*18;
    ctx.fillStyle='#ff6a00';ctx.globalAlpha=0.15+Math.sin(t*.002+i)*0.1;
    ctx.beginPath();ctx.arc(W/2+Math.cos(a)*r,H/2+Math.sin(a)*r,6+i*4,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.fillStyle='#ff6a00';ctx.font='bold 24px monospace';ctx.textAlign='center';
  ctx.shadowColor='#ff6a00';ctx.shadowBlur=20;
  ctx.fillText('MARIO BROTHERS',W/2,H/2-24);
  ctx.shadowBlur=0;
  ctx.fillStyle='#888';ctx.font='10px monospace';
  ctx.fillText('FULL GAME COMING SOON',W/2,H/2+8);
  ctx.fillStyle='#444';ctx.font='9px monospace';
  ctx.fillText('HOLD ESC 2.5s IN ARCADE TO EXIT',W/2,H/2+30);
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script></body></html>
